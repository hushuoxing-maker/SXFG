<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酸液幻觉 · 高级酸性风格海报提示词生成器 - 古月AI智能体</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}
body{
  background: linear-gradient(120deg,#0ff,#f0f,#ff0,#0f0,#f00);
  background-size: 500% 500%;
  animation: gradientBG 20s ease infinite;
  min-height:100vh;
  color:#fefefe;
  padding:60px;
}
@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
.container{max-width:1200px;margin:auto;}
h1{text-align:center;font-size:32px;margin-bottom:40px;font-weight:800;text-shadow:2px 2px 6px rgba(0,0,0,0.7);}
.card{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:25px;
  border:2px solid;
  border-image: linear-gradient(45deg,#0ff,#f0f,#ff0,#0f0,#f00) 1;
  box-shadow:0 15px 35px rgba(0,0,0,0.6);
  margin-bottom:30px;
  transition:0.3s;
}
.card:hover{transform:translateY(-3px) scale(1.02);}
label{font-size:14px;opacity:0.9;color:#fff;}
input{
  width:100%;
  padding:14px;
  margin-top:8px;
  margin-bottom:18px;
  background:rgba(0,0,0,0.4);
  border:1px solid #0ff;
  border-radius:12px;
  color:white;
  font-size:16px;
}
button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:700;
  background: linear-gradient(135deg,#0ff,#f0f,#ff0,#0f0,#f00);
  color:#000;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
  transition:0.3s;
}
button:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.6);}
.generate{width:100%;margin-top:10px;}
.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(450px,1fr));gap:20px;}
.promptCard{
  background:rgba(0,0,0,0.65);
  border-radius:18px;
  border-left:5px solid #f0f;
  border-top:5px solid #0ff;
  padding:22px;
  line-height:1.8;
  position:relative;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition:0.3s;
}
.promptCard:hover{transform:scale(1.02);}
.promptTitle{font-size:18px;font-weight:800;margin-bottom:10px;color:#0ff;text-shadow:1px 1px 3px #000;}
.promptText{white-space:pre-wrap;font-size:14px;opacity:0.95;color:#fff;}
.copyBtn{
  margin-top:16px;
  background:linear-gradient(135deg,#f0f,#0ff,#ff0);
  padding:8px 16px;
  border-radius:10px;
  color:#000;
  border:none;
  cursor:pointer;
  font-weight:700;
  transition:0.3s;
}
.copyBtn.copied{background:rgba(100,100,100,0.8);color:#fff;}
.copyBtn:hover{transform:translateY(-2px);}
</style>
</head>
<body>
<div class="container">
<h1>酸液幻觉 · 高级酸性风格海报提示词生成器 - 古月AI智能体</h1>

<div class="card">
<label>海报主题 / 产品名称</label>
<input id="title" placeholder="例如：ACID PARTY">
<label>海报副标题 / 卖点</label>
<input id="subtitle" placeholder="例如：迷幻液态金属之夜">
<button class="generate" onclick="generate()">生成20组酸性风格提示词</button>
</div>

<div id="results" class="results"></div>
</div>

<script>
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

let assistTexts=[
  "ACID","PSY","TECHNO","限时派对","迷幻夜","液态金属","镭射炫彩","溶解效果",
  "赛博元素","全息光晕","扭曲网格","金属铭牌","霓虹光效","RGB干扰","电子符号","迷幻标签"
];

let coreElements=[
  "液态金属流动、水银滴落、熔化金属","镭射全息反光、彩虹光晕、光栅效果","赛博格机械义体、电路纹路、电子元件",
  "复古未来符号：土星环、金字塔、第三眼、希腊雕塑","迷幻图形：无限漩涡、扭曲网格、欧普艺术纹样",
  "亚文化符号：笑脸、蝴蝶、钉子、锁链","抽象有机体：黏质流动、生长晶体"
];

let visualStyles=[
  "液态流动、金属质感、镭射炫彩、扭曲变形、溶解效果、网格叠加、故障干扰、荧光冲击、欧普迷幻、复古未来",
  "液态金属滴落与文字融合，镭射光晕渲染背景，扭曲变形字体溶解边缘，RGB干扰点缀",
  "赛博朋克风格网格叠加，机械义体元素贯穿，霓虹光彩反射文字，迷幻图形扩散",
  "复古未来Y2K渲染，液态流动字体，电子符号环绕，光栅渐变镭射，整体高冲击力"
];

let layoutStyles=[
  "主标题液态金属融化流动，副标题悬浮于全息铭牌，辅助文字散落网格边缘",
  "主标题扭曲拉伸溶解，副标题镭射炫彩，辅助文字嵌入电子符号",
  "主标题滴落液态字体，副标题半透明溶解，辅助文字沿光栅网格分布",
  "主标题旋涡变形字体，副标题RGB干扰标签，辅助文字镭射光晕环绕"
];

function generate(){
  let title=document.getElementById("title").value.trim();
  let subtitle=document.getElementById("subtitle").value.trim();
  if(!title){alert("请输入海报主题");return;}
  let container=document.getElementById("results");
  container.innerHTML="";
  
  for(let i=1;i<=20;i++){
    let assist=rand(assistTexts);
    let core=rand(coreElements);
    let style=rand(visualStyles);
    let layout=rand(layoutStyles);
    
    let text=`主标题：${title}
副标题：${subtitle}
辅助文字 / 标签：${assist}
核心视觉元素：${core}
视觉表现手法：${style}
文字布局：${layout}
风格描述：迷幻眩惑、金属流动、镭射炫彩、液态美学、复古未来感、高冲击力视觉、亚文化基因，色彩以金属色系+荧光色+黑白色为主，整体充满迷幻电子氛围与反叛精神。`;
    
    let card=document.createElement("div");
    card.className="promptCard";
    card.innerHTML=`
      <div class="promptTitle">提示词 #${i}</div>
      <div class="promptText">${text}</div>
      <button class="copyBtn">复制提示词</button>
    `;
    let btn=card.querySelector("button");
    btn.onclick=function(){
      navigator.clipboard.writeText(text);
      btn.innerText="已复制";
      btn.classList.add("copied");
      setTimeout(()=>{
        btn.innerText="复制提示词";
        btn.classList.remove("copied");
      },3000);
    };
    container.appendChild(card);
  }
}
</script>
</body>
</html>
